<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N4P Remote Table Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --felt:    #0a2e1a; --felt-hi: #0f3d22;
      --rail:    #1e1206;
      --gold:    #c9922a; --gold-hi: #f0c060;
      --bg:      #07090a; --bg2:     #0d1210;
      --card:    #111918;
      --border:  rgba(201,146,42,.18);
      --text:    #cec4a4; --text-d:  #6a6050; --text-hi: #ede4c4;
      --green:   #22c55e; --green-d: #0d6b30;
      --red:     #ef4444; --red-d:   #7a1f1f;
      --blue:    #38bdf8; --blue-d:  #0c4a6e;
      --amber:   #f59e0b; --amber-d: #78350f;
      --purple:  #a78bfa; --purple-d:#3b0764;
      --slate:   #94a3b8; --slate-d: #1e293b;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: linear-gradient(90deg, #091510, #0c1410);
      border-bottom: 2px solid var(--gold);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display:flex; align-items:center; gap:12px; }
    .chip {
      width:32px; height:32px; border-radius:50%;
      background:var(--gold); border:3px dashed #1e1206;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:11px; color:#000;
      box-shadow:0 0 10px rgba(201,146,42,.45);
    }
    .logo h1 { font-size:1.2em; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--text-hi); }
    .logo h1 em { color:var(--gold); font-style:normal; }
    .hdr-r { display:flex; align-items:center; gap:10px; }
    .badge { padding:3px 10px; border-radius:3px; font-size:.65em; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .badge-amber { background:var(--amber-d); border:1px solid var(--amber); color:var(--amber); }
    .badge-green { background:var(--green-d); border:1px solid var(--green); color:var(--green); }
    .badge-red { background:var(--red-d); border:1px solid var(--red); color:var(--red); }
    .ldot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s ease-in-out infinite; }
    .ldot.error { background:var(--red); box-shadow:0 0 6px var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Status area */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .6em;
      color: var(--text-d);
      letter-spacing: 1px;
    }
    .status-bar .sep { color: var(--border); margin: 0 2px; }

    /* ── PAGE GRID ─────────────────────────────── */
    .page {
      display: grid;
      grid-template-columns: 1fr 270px;
      height: calc(100vh - 50px);
    }
    @media(max-width:1050px) { .page { grid-template-columns:1fr; } .sidebar { display:none; } }

    /* ── TABLE COLUMN ──────────────────────────── */
    .tcol {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 10px;
    }

    .loading {
      display: flex; align-items: center;
      font-size: 1em; color: var(--text-d); letter-spacing: 2px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner {
      width:15px; height:15px; border-radius:50%;
      border:2px solid rgba(201,146,42,.2);
      border-top-color:var(--gold);
      animation:spin .8s linear infinite;
      margin-right:10px; flex-shrink:0;
    }

    /* ── FELT OVAL ─────────────────────────────── */
    .felt-wrap {
      position: relative;
      width: min(820px, 100%);
      aspect-ratio: 820/560;
    }

    .felt {
      width:100%; height:100%;
      background: radial-gradient(ellipse at 48% 42%, #1d6335 0%, #0a2e1a 60%, #061b0f 100%);
      border-radius: 50%;
      border: 16px solid var(--rail);
      box-shadow:
        0 0 0 3px var(--gold),
        inset 0 0 90px rgba(0,0,0,.55),
        0 20px 60px rgba(0,0,0,.9);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .felt::before {
      content:''; position:absolute; inset:-16px; border-radius:50%;
      background:linear-gradient(135deg, rgba(240,192,96,.22) 0%, transparent 35%, transparent 65%, rgba(240,192,96,.08) 100%);
      pointer-events:none;
    }
    .felt::after {
      content:'N4P'; position:absolute;
      font-size:3.5em; font-weight:700; letter-spacing:10px;
      color:rgba(255,255,255,.022); pointer-events:none; user-select:none;
    }

    /* ── CENTER INFO ────────────────────────────── */
    .ctr { text-align:center; position:relative; z-index:2; }
    .pot-d {
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(1.3em,2.5vw,2em);
      font-weight:700; color:var(--gold-hi);
      text-shadow:0 0 20px rgba(240,192,96,.4);
    }
    .street-d {
      font-size:.68em; letter-spacing:3px;
      color:var(--text-d); text-transform:uppercase; margin-top:2px;
    }
    .board-d { display:flex; justify-content:center; gap:5px; margin-top:12px; flex-wrap:wrap; }

    /* ── PLAYING CARDS ─────────────────────────── */
    .card {
      background:#f5f0e8; color:#1a1a1a;
      border-radius:4px; padding:7px 6px;
      min-width:36px; text-align:center;
      font-weight:700; font-size:.9em;
      font-family:'Share Tech Mono',monospace;
      box-shadow:0 3px 7px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.8);
      border:1px solid rgba(0,0,0,.14); line-height:1.1;
    }
    .card.red { color:#c0392b; }

    /* mini hole card badges */
    .hc {
      background:#f5f0e8; color:#1a1a1a;
      border-radius:3px; padding:2px 4px;
      font-size:.66em; font-weight:700;
      font-family:'Share Tech Mono',monospace;
      box-shadow:0 1px 3px rgba(0,0,0,.4);
      border:1px solid rgba(0,0,0,.12); line-height:1.2;
    }
    .hc.red { color:#c0392b; }

    /* ── SEATS WRAPPER ─────────────────────────── */
    /* seats are absolutely positioned inside .felt-wrap */
    .seats-wrap { position:absolute; inset:0; pointer-events:none; }

    .seat {
      position: absolute;
      width: 205px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2.5px solid transparent;
      border-radius: 8px;
      padding: 9px 9px 7px;
      pointer-events: auto;
      transition: border-color .2s, box-shadow .2s;
    }

    /* seat states */
    .seat.empty     {
      border-top-color:#1a2820;
      opacity:.35;
      filter: grayscale(0.5);
    }
    .seat.seated    {
      border-top-color:#2a3a30;
      opacity:1;
    }
    .seat.connected {
      border-top-color:var(--green-d);
      opacity:1;
    }
    .seat.on-clock  {
      border-top-color:var(--amber);
      box-shadow:0 0 0 2px rgba(245,158,11,.5), 0 0 25px rgba(245,158,11,.3);
      animation: glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow:0 0 0 2px rgba(245,158,11,.5), 0 0 25px rgba(245,158,11,.3); }
      50% { box-shadow:0 0 0 2px rgba(245,158,11,.7), 0 0 35px rgba(245,158,11,.5); }
    }
    .seat.pending   {
      border-top-color:var(--gold);
      animation: pending-blink 1s ease-in-out infinite;
    }
    @keyframes pending-blink {
      0%, 100% { opacity:1; }
      50% { opacity:0.7; }
    }

    /* 9 seat positions — improved oval layout (no overlap) */
    .seat[data-s="1"] { top:-8%;  left:50%;  transform:translateX(-50%); }
    .seat[data-s="2"] { top:3%;   left:73%;  }
    .seat[data-s="3"] { top:30%;  left:85%;  }
    .seat[data-s="4"] { top:63%;  left:76%;  }
    .seat[data-s="5"] { top:92%;  left:50%;  transform:translateX(-50%); }
    .seat[data-s="6"] { top:63%;  left:-2%;  }
    .seat[data-s="7"] { top:30%;  left:-10%; }
    .seat[data-s="8"] { top:3%;   left:2%;   }
    .seat[data-s="9"] { top:-8%;  left:23%;  }

    /* ── SEAT INTERNALS ────────────────────────── */
    .s-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
    .s-num {
      font-size:.6em; font-weight:700; letter-spacing:1px;
      color:var(--text-d); text-transform:uppercase;
      display:flex; align-items:center; gap:4px;
    }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .dg  { background:var(--green); box-shadow:0 0 5px var(--green); }
    .da  { background:var(--amber); box-shadow:0 0 5px var(--amber); animation:pulse 1s ease-in-out infinite; }
    .dd  { background:#252e2a; }

    .ring {
      display:inline-block; width:8px; height:8px; border-radius:50%;
      border:1.5px solid var(--amber); border-top-color:transparent;
      animation:spin .7s linear infinite; vertical-align:middle; margin-left:3px;
    }

    .dealer-d {
      width:17px; height:17px; border-radius:50%;
      background:var(--gold-hi); color:#000;
      font-size:.58em; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      border:1.5px solid #fff;
    }

    .s-name {
      font-size:.92em; font-weight:700; color:var(--text-hi);
      text-align:center; margin:4px 0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .s-name.vacant {
      color:var(--text-d);
      font-style:italic;
      font-weight:400;
      font-size:.75em;
      opacity: 0.6;
    }

    .s-stack {
      font-family:'Share Tech Mono',monospace;
      font-size:.78em; color:var(--gold);
      text-align:center; margin-bottom:3px;
    }
    .s-stack .ago { font-size:.8em; color:var(--text-d); margin-left:4px; }

    .hole-row { display:flex; gap:3px; justify-content:center; margin:3px 0; }

    .s-clock {
      text-align:center; font-size:.62em; font-weight:700;
      letter-spacing:2px; color:var(--amber); text-transform:uppercase; margin:2px 0;
    }

    .s-pend {
      font-size:.6em; font-weight:700; letter-spacing:1px;
      color:var(--gold); text-transform:uppercase;
      background:rgba(201,146,42,.07);
      border-left:2px solid var(--gold);
      padding:3px 6px; border-radius:2px; margin:3px 0;
    }

    /* ── ACTION BUTTON ROWS ────────────────────── */
    .btn-row {
      display: grid;
      gap: 4px;
      margin-top: 5px;
    }
    .btn-row.r3 { grid-template-columns:1fr 1fr 1fr; }
    .btn-row.r2 { grid-template-columns:1fr 1fr; }
    .btn-row.r1 { grid-template-columns:1fr; }
    .btn-row:first-of-type { margin-top: 6px; }

    .btn-row button {
      padding: 6px 3px;
      border: 1px solid transparent;
      border-radius: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-size: .63em; font-weight:700;
      letter-spacing: .5px; text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      background: rgba(255,255,255,.03);
      color: var(--text-d);
      white-space: nowrap;
      position: relative;
    }
    .btn-row button:hover:not(:disabled) {
      transform:translateY(-1px);
      box-shadow:0 3px 6px rgba(0,0,0,.4);
    }
    .btn-row button:active:not(:disabled) {
      transform:translateY(0);
      box-shadow:0 1px 2px rgba(0,0,0,.3);
    }
    .btn-row button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      filter: grayscale(0.7);
    }
    .btn-row button.btn-success {
      animation: btn-flash-success .4s ease-out;
    }
    .btn-row button.btn-error {
      animation: btn-flash-error .4s ease-out;
    }
    @keyframes btn-flash-success {
      0% { background: rgba(34,197,94,.5); }
      100% { background: rgba(34,197,94,.05); }
    }
    @keyframes btn-flash-error {
      0% { background: rgba(239,68,68,.5); }
      100% { background: rgba(239,68,68,.05); }
    }

    /* colour variants */
    .b-fold { border-color:var(--red-d);    color:var(--red);    background:rgba(239,68,68,.1); }
    .b-chk  { border-color:var(--green-d);  color:var(--green);  background:rgba(34,197,94,.1); }
    .b-call { border-color:var(--blue-d);   color:var(--blue);   background:rgba(56,189,248,.1); }
    .b-max  { border-color:var(--amber-d);  color:var(--amber);  background:rgba(245,158,11,.1); }
    .b-exec { border-color:#4f46e5;         color:#818cf8;       background:rgba(99,102,241,.1); }
    .b-cout { border-color:rgba(201,146,42,.3); color:var(--gold); background:rgba(201,146,42,.07); }
    .b-pre  { border-color:rgba(245,158,11,.25); color:rgba(245,158,11,.65); background:rgba(245,158,11,.05); font-size:.62em!important; }
    .b-ps   { border-color:var(--slate-d);  color:var(--slate);  background:rgba(148,163,184,.06); font-size:.58em!important; }
    .b-clr  { border-color:#334155;         color:#64748b;       background:rgba(100,116,139,.06); font-size:.58em!important; }
    .ps-row {
      display:flex;
      gap:4px;
      margin-top:5px;
      justify-content: space-between;
    }
    .ps-tick {
      flex:1;
      display:flex;
      align-items:center;
      gap:4px;
      font-size:.60em;
      font-weight:600;
      color:var(--text-d);
      cursor:pointer;
      letter-spacing:.5px;
      text-transform:uppercase;
      padding:4px 3px;
      user-select:none;
      transition: all .15s;
      border-radius: 3px;
      background: rgba(255,255,255,.02);
    }
    .ps-tick:hover { color:var(--text); background: rgba(255,255,255,.05); }
    .ps-box {
      width:11px;
      height:11px;
      border-radius:2px;
      border:1.5px solid #334155;
      background:transparent;
      flex-shrink:0;
      transition:all .15s;
      display:inline-block;
    }
    .ps-tick.active {
      color:var(--amber);
      background: rgba(245,158,11,.1);
    }
    .ps-tick.active .ps-box {
      background:var(--amber);
      border-color:var(--amber);
      box-shadow:0 0 5px rgba(245,158,11,.4);
    }

    .b-fold:hover { background:rgba(239,68,68,.25);    border-color:var(--red); }
    .b-chk:hover  { background:rgba(34,197,94,.25);    border-color:var(--green); }
    .b-call:hover { background:rgba(56,189,248,.25);   border-color:var(--blue); }
    .b-max:hover  { background:rgba(245,158,11,.25);   border-color:var(--amber); }
    .b-exec:hover { background:rgba(99,102,241,.25);   border-color:#818cf8; }
    .b-cout:hover { background:rgba(201,146,42,.2);    border-color:var(--gold); }
    .b-pre:hover  { background:rgba(245,158,11,.18);   border-color:var(--amber); color:var(--amber); }
    .b-ps:hover   { background:rgba(148,163,184,.15);  border-color:var(--slate); color:var(--text); }

    /* divider between action groups */
    .btn-div {
      margin: 6px 0 3px;
      border: none;
      border-top: 1px solid rgba(201,146,42,.15);
      height: 0;
    }

    /* ── SIDEBAR ───────────────────────────────── */
    .sidebar {
      background:var(--bg2);
      border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .panel { border-bottom:1px solid var(--border); }
    .phd {
      padding:7px 13px;
      background:rgba(201,146,42,.04);
      border-bottom:1px solid var(--border);
      font-size:.6em; font-weight:700; letter-spacing:2px;
      text-transform:uppercase; color:var(--gold);
      display:flex; align-items:center; gap:6px;
    }
    .phd::before { content:''; width:5px; height:5px; background:var(--gold); border-radius:50%; }

    /* stats */
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); }
    .stat  { background:var(--bg2); padding:9px 12px; text-align:center; }
    .sl    { font-size:.57em; letter-spacing:2px; text-transform:uppercase; color:var(--text-d); margin-bottom:2px; }
    .sv    { font-family:'Share Tech Mono',monospace; font-size:.92em; color:var(--text-hi); }
    .sv.g  { color:var(--gold-hi); }

    /* pre-select */
    .presel { padding:7px; display:flex; flex-direction:column; gap:3px; }
    .psb {
      width:100%; padding:6px 10px;
      background:rgba(255,255,255,.025);
      border:1px solid var(--border); border-radius:3px;
      color:var(--text-d);
      font-family:'Rajdhani',sans-serif;
      font-size:.7em; font-weight:700; letter-spacing:1px;
      text-transform:uppercase; cursor:pointer; text-align:left;
      transition:all .13s;
      display:flex; align-items:center; gap:7px;
    }
    .psb:hover { border-color:var(--gold); color:var(--text); }
    .psb.active { background:rgba(201,146,42,.1); border-color:var(--gold); color:var(--gold); }
    .psr { width:8px; height:8px; border-radius:50%; border:1.5px solid currentColor; flex-shrink:0; }
    .psb.active .psr { background:var(--gold); border-color:var(--gold); }

    /* log */
    .log-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
    .log-list {
      flex:1; overflow-y:auto; padding:5px;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    .log-list::-webkit-scrollbar { width:3px; }
    .log-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .le {
      padding:5px 8px; margin-bottom:3px; border-radius:3px;
      font-size:.7em; display:flex; justify-content:space-between;
      align-items:center; gap:5px; border-left:2px solid transparent;
    }
    .le-b { display:flex; align-items:center; gap:5px; flex:1; min-width:0; overflow:hidden; }
    .le-b span:last-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .le-ts { font-family:'Share Tech Mono',monospace; font-size:.7em; color:var(--text-d); white-space:nowrap; }
    .li  { background:rgba(56,189,248,.06);  border-left-color:#38bdf8; }
    .ls  { background:rgba(34,197,94,.06);   border-left-color:#22c55e; }
    .lw  { background:rgba(245,158,11,.06);  border-left-color:#f59e0b; }
    .ler { background:rgba(239,68,68,.06);   border-left-color:#ef4444; }

    /* blink on new player */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.65} }
    .blink { animation:blink .5s ease-in-out 3; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">
    <div class="chip">N4P</div>
    <h1><em>Remote</em> Table Control</h1>
  </div>
  <div class="hdr-r">
    <div class="status-bar">
      <span id="statusText">Connecting...</span>
      <span class="sep">|</span>
      <span id="lastUpdate">—</span>
    </div>
    <div class="ldot" id="liveDot"></div>
    <div class="badge badge-amber">Test Server</div>
  </div>
</div>

<div class="page">

  <!-- TABLE -->
  <div class="tcol">
    <div id="loadMsg" class="loading"><div class="spinner"></div>Connecting...</div>

    <div class="felt-wrap" id="tableWrap" style="display:none;">
      <div class="felt">
        <div class="ctr">
          <div class="pot-d"  id="potD">R 0.00</div>
          <div class="street-d" id="streetD">WAITING</div>
          <div class="board-d"  id="boardD"></div>
        </div>
      </div>
      <!-- seats injected here -->
      <div class="seats-wrap" id="seatsWrap"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="panel">
      <div class="phd">Table Stats</div>
      <div class="stats">
        <div class="stat"><div class="sl">Pot</div>   <div class="sv g" id="sPot">—</div></div>
        <div class="stat"><div class="sl">Street</div><div class="sv"   id="sStr">—</div></div>
        <div class="stat"><div class="sl">Players</div><div class="sv"  id="sPly">—</div></div>
        <div class="stat"><div class="sl">Table</div> <div class="sv"   id="sTbl">—</div></div>
      </div>
    </div>



    <div class="panel log-wrap">
      <div class="phd">Command Log</div>
      <div class="log-list" id="logEl" role="log" aria-live="polite">
        <div class="le li">
          <div class="le-b"><span>ℹ</span><span>System ready</span></div>
          <span class="le-ts" id="sysTs"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const API = '/api';
  let logs = [], heroTid = null, heroSno = null, prevSeats = {};

  /* ── Helpers ───────────────────────────────────────────────────────── */
  const SYM = s => ({h:'♥',d:'♦',c:'♣',s:'♠'}[s] || s);
  const RED = s => s==='h' || s==='d';

  function bigCard(code) {
    if (!code) return '';
    const s = code[0], r = code.slice(1).toUpperCase();
    return `<div class="card${RED(s)?' red':''}">${r}${SYM(s)}</div>`;
  }

  function miniCard(code) {
    if (!code) return '';
    const s = code[0], r = code.slice(1).toUpperCase();
    return `<div class="hc${RED(s)?' red':''}">${r}${SYM(s)}</div>`;
  }

  function agoStr(ts) {
    if (!ts) return '';
    const s = Math.round(Date.now()/1000 - ts);
    return s < 60 ? `${s}s` : `${Math.round(s/60)}m`;
  }

  /* ── Log ───────────────────────────────────────────────────────────── */
  function addLog(msg, type='info') {
    const cls  = {info:'li',success:'ls',warning:'lw',error:'ler'}[type]||'li';
    const icon = {info:'ℹ',success:'✓',warning:'⚠',error:'✗'}[type]||'ℹ';
    logs.unshift({msg, cls, icon, ts: new Date().toLocaleTimeString()});
    if (logs.length > 30) logs = logs.slice(0,30);
    document.getElementById('logEl').innerHTML = logs.map(e =>
      `<div class="le ${e.cls}">
         <div class="le-b"><span>${e.icon}</span><span>${e.msg}</span></div>
         <span class="le-ts">${e.ts}</span>
       </div>`
    ).join('');
  }

  /* ── Queue command ─────────────────────────────────────────────────── */
  function qCmd(tid, sno, type, btnEl) {
    fetch(API+'/commands/queue', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({table_id:tid, seat_no:sno, command_type:type})
    })
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        addLog(`${type.toUpperCase()} → Seat ${sno}`, 'success');
        // Visual feedback on button
        if (btnEl && btnEl.classList) {
          btnEl.classList.add('btn-success');
          setTimeout(() => btnEl.classList.remove('btn-success'), 400);
        }
      } else {
        addLog(`Failed: ${d.error}`, 'error');
        if (btnEl && btnEl.classList) {
          btnEl.classList.add('btn-error');
          setTimeout(() => btnEl.classList.remove('btn-error'), 400);
        }
      }
    })
    .catch(e => {
      addLog(`Network: ${e.message}`, 'error');
      if (btnEl && btnEl.classList) {
        btnEl.classList.add('btn-error');
        setTimeout(() => btnEl.classList.remove('btn-error'), 400);
      }
    });
  }

  /* ── Pre-select sidebar ────────────────────────────────────────────── */
  function setPS(btn) {
    const c = btn.dataset.cmd;
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      if (heroTid && heroSno) qCmd(heroTid, heroSno, 'clear_preaction');
      addLog('Pre-select cleared');
      return;
    }
    document.getElementById('psGrid').querySelectorAll('.psb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (heroTid && heroSno) qCmd(heroTid, heroSno, c);
    else addLog('Pre-select set (no hero connected)', 'warning');
  }

  /* ── Toggle pre-select tick box ────────────────────────────────────── */
  function togglePs(label, tid, sno, cmd) {
    const row = label.closest('.ps-row');
    const wasActive = label.classList.contains('active');
    // Clear all in this row
    row.querySelectorAll('.ps-tick').forEach(l => l.classList.remove('active'));
    if (wasActive) {
      // Was on — turn off, clear preaction
      qCmd(tid, sno, 'clear_preaction');
    } else {
      // Turn on
      label.classList.add('active');
      qCmd(tid, sno, cmd);
    }
  }

  /* ── Render one seat ───────────────────────────────────────────────── */
  function renderSeat(seat, tid) {
    const occ  = !!seat.name;
    const conn = !!(seat.connected || seat.is_hero);
    const clk  = !!seat.on_clock;
    const pend = !!seat.pending_cmd;

    if (conn) { heroTid = tid; heroSno = seat.seat_no; }

    let state = 'empty';
    if (occ)  state = 'seated';
    if (conn) state = 'connected';
    if (clk)  state = 'on-clock';
    if (pend) state += ' pending';

    const dotCls = clk ? 'da' : conn ? 'dg' : 'dd';
    const stack  = occ && seat.stack_zar != null ? `R${Number(seat.stack_zar).toFixed(2)}` : '';
    const ag     = agoStr(seat.last_seen);
    const hc     = (seat.hole_cards||[]).map(miniCard).join('');

    const el = document.createElement('div');
    el.className = `seat ${state}`;
    el.dataset.s = seat.seat_no;
    el.id = `seat-${seat.seat_no}`;

    el.innerHTML = `
      <div class="s-top">
        <span class="s-num">
          <span class="dot ${dotCls}"></span>
          Seat ${seat.seat_no}
          ${clk ? '<span class="ring"></span>' : ''}
        </span>
        ${seat.is_dealer ? '<div class="dealer-d">D</div>' : ''}
      </div>

      <div class="s-name${occ ? '' : ' vacant'}">${occ ? seat.name : 'Empty'}</div>

      ${hc ? `<div class="hole-row">${hc}</div>` : ''}

      ${stack ? `<div class="s-stack">${stack}${conn && ag ? `<span class="ago">${ag}</span>` : ''}</div>` : ''}

      ${clk  ? `<div class="s-clock">▶ Action</div>` : ''}
      ${pend ? `<div class="s-pend">⏳ ${seat.pending_cmd}</div>` : ''}

        <!-- Row 1: main actions -->
        <div class="btn-row r3">
          <button class="b-fold" onclick="qCmd('${tid}',${seat.seat_no},'fold',this)">Fold</button>
          <button class="b-chk"  onclick="qCmd('${tid}',${seat.seat_no},'check',this)">Check</button>
          <button class="b-call" onclick="qCmd('${tid}',${seat.seat_no},'call',this)">Call</button>
        </div>
        <!-- Row 2: raise presets -->
        <div class="btn-row r3">
          <button class="b-pre" onclick="qCmd('${tid}',${seat.seat_no},'raise_min',this)">Min</button>
          <button class="b-pre" onclick="qCmd('${tid}',${seat.seat_no},'raise_half',this)">½ Pot</button>
          <button class="b-pre" onclick="qCmd('${tid}',${seat.seat_no},'raise_pot',this)">Pot</button>
        </div>
        <!-- Row 3: max + execute + cashout -->
        <div class="btn-row r3">
          <button class="b-max"  onclick="qCmd('${tid}',${seat.seat_no},'raise_max',this)">Max</button>
          <button class="b-exec" onclick="qCmd('${tid}',${seat.seat_no},'confirm_raise',this)">Execute</button>
          <button class="b-cout" onclick="qCmd('${tid}',${seat.seat_no},'cashout',this)">Cash Out</button>
        </div>
        <!-- Pre-select tick boxes -->
        <hr class="btn-div">
        <div class="ps-row">
          <label class="ps-tick" onclick="togglePs(this,'${tid}',${seat.seat_no},'check_fold')">
            <span class="ps-box"></span>Check/Fold
          </label>
          <label class="ps-tick" onclick="togglePs(this,'${tid}',${seat.seat_no},'check_only')">
            <span class="ps-box"></span>Check
          </label>
          <label class="ps-tick" onclick="togglePs(this,'${tid}',${seat.seat_no},'call_any')">
            <span class="ps-box"></span>Call Any
          </label>
        </div>
        <div class="ps-row">
          <label class="ps-tick" onclick="togglePs(this,'${tid}',${seat.seat_no},'fold_any')">
            <span class="ps-box"></span>Fold Any
          </label>
          <label class="ps-tick" onclick="togglePs(this,'${tid}',${seat.seat_no},'sit_out')">
            <span class="ps-box"></span>Sit Out
          </label>
        </div>

    `;

    return el;
  }

  /* ── Poll /api/table/latest ────────────────────────────────────────── */
  function poll() {
    fetch(API+'/table/latest')
      .then(r => r.json())
      .then(data => {
        if (!data.ok) {
          addLog('Table fetch failed','warning');
          document.getElementById('statusText').textContent = 'API Error';
          document.getElementById('liveDot').classList.add('error');
          return;
        }
        const t = data.table;

        document.getElementById('loadMsg').style.display = 'none';
        document.getElementById('tableWrap').style.display = 'block';
        document.getElementById('liveDot').style.background = 'var(--green)';
        document.getElementById('liveDot').classList.remove('error');
        document.getElementById('statusText').textContent = 'Connected';
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

        const pot = Number(t.pot_zar) || 0;
        document.getElementById('potD').textContent    = `R ${pot.toFixed(2)}`;
        document.getElementById('streetD').textContent = t.street || 'WAITING';
        document.getElementById('sPot').textContent    = `R${pot.toFixed(2)}`;
        document.getElementById('sStr').textContent    = t.street || '—';
        document.getElementById('sTbl').textContent    = t.table_id || '—';
        const occ = (t.seats||[]).filter(s => s.name).length;
        document.getElementById('sPly').textContent    = `${occ}/${(t.seats||[]).length}`;

        // board cards
        const bd = t.board || {};
        const bc = [...(bd.flop||[])];
        if (bd.turn)  bc.push(bd.turn);
        if (bd.river) bc.push(bd.river);
        document.getElementById('boardD').innerHTML = bc.map(bigCard).join('');

        // build seat index
        const cur = {};
        (t.seats||[]).forEach(s => { cur[s.seat_no] = s; });

        // blink newly seated players
        Object.keys(cur).forEach(sno => {
          const c = cur[sno], p = prevSeats[sno];
          if (c.name && (!p || !p.name)) {
            setTimeout(() => {
              const el = document.getElementById(`seat-${sno}`);
              if (el) { el.classList.add('blink'); setTimeout(()=>el.classList.remove('blink'),1500); }
            }, 100);
            addLog(`${c.name} seated at Seat ${sno}`, 'success');
          }
        });

        // rebuild all seat cards
        const wrap = document.getElementById('seatsWrap');
        wrap.innerHTML = '';
        (t.seats||[]).forEach(s => wrap.appendChild(renderSeat(s, t.table_id)));

        prevSeats = cur;
      })
      .catch(e => {
        document.getElementById('liveDot').style.background = 'var(--red)';
        document.getElementById('liveDot').classList.add('error');
        document.getElementById('statusText').textContent = 'Disconnected';
        addLog(`Connection error: ${e.message}`, 'error');
      });
  }

  document.getElementById('sysTs').textContent = new Date().toLocaleTimeString();
  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>

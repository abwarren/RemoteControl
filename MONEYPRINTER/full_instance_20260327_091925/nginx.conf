worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name test.potlimitomaha.xyz engine.potlimitomaha.xyz;
        return 301 https://$server_name:8080$request_uri;
    }

    # Remote Control (existing - test.potlimitomaha.xyz)
    server {
        listen 8080 ssl http2;
        server_name test.potlimitomaha.xyz;

        ssl_certificate /opt/nginx-config/certs/selfsigned.crt;
        ssl_certificate_key /opt/nginx-config/certs/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Remote Control API
        location /api/ {
            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;
                add_header Access-Control-Max-Age 3600;
                return 204;
            }

            proxy_pass http://172.31.41.21:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;
        }

        location /collector {
            proxy_pass http://172.31.41.21:5000/collector;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend Shell - monitoring dashboard
        location /shell {
            proxy_pass http://172.31.41.21:5000/shell;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth pages
        location /login {
            proxy_pass http://172.31.41.21:5000/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /change-password {
            proxy_pass http://172.31.41.21:5000/change-password;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin Panel Routes (NEW - added for frontend admin panel)
        # Admin Panel Routes (NEW - added for frontend admin panel)
        location /remote {
            proxy_pass http://172.31.41.21:5000/remote;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /tables {
            proxy_pass http://172.31.41.21:5000/tables;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/logs {
            proxy_pass http://172.31.41.21:5000/admin/logs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /logout {
            proxy_pass http://172.31.41.21:5000/logout;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /engine {
            proxy_pass http://172.31.41.21:5000/engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /bots {
            proxy_pass http://172.31.41.21:5000/bots;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://172.31.41.21:5000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            proxy_pass http://172.31.41.21:5000/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # N4P Scripts with CORS
        location ~ ^/(n4p\.js|n4p-loader\.js)$ {
            root /opt/plo-equity/static;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Content-Type application/javascript;
        }

        # Browser VNC endpoints
        location /browser1/ {
            proxy_pass http://172.31.41.21:6081/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 61s;
            proxy_buffering off;
        }

        location /browser2/ {
            proxy_pass http://172.31.41.21:6082/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 61s;
            proxy_buffering off;
        }

        location /browser3/ {
            proxy_pass http://172.31.41.21:6083/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 61s;
            proxy_buffering off;
        }

        location /browser4/ {
            proxy_pass http://172.31.41.21:6084/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 61s;
            proxy_buffering off;
        }

        # Remote Control Static Files
        location / {
            root /opt/plo-equity/static;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }

    # PLO Equity Engine (migrated nuts4poker - engine.potlimitomaha.xyz)
    server {
        listen 8080 ssl http2;
        server_name engine.potlimitomaha.xyz;

        ssl_certificate /opt/nginx-config/certs/selfsigned.crt;
        ssl_certificate_key /opt/nginx-config/certs/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend static files
        location / {
            root /var/www/plo-test;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Flask API + SSE streaming
        location /api/ {
            proxy_pass http://127.0.0.1:8081/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # For SSE streaming
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
        }

        # Hand collector
        location /collector {
            proxy_pass http://127.0.0.1:6001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # n4p.js scraper
        location /n4p.js {

            alias /var/www/plo-test/n4p.js;
            add_header Access-Control-Allow-Origin * always;
            add_header Content-Type application/javascript;
        }
    }

    server {
        listen 80;
        server_name mid.potlimitomaha.xyz;
        
        location / {
            return 200 "Browser Access via engine.potlimitomaha.xyz:8080\n\nBrowser 1: https://engine.potlimitomaha.xyz:8080/browser1/\nBrowser 2: https://engine.potlimitomaha.xyz:8080/browser2/\nBrowser 3: https://engine.potlimitomaha.xyz:8080/browser3/\nBrowser 4: https://engine.potlimitomaha.xyz:8080/browser4/\n";
            add_header Content-Type text/plain;
        }
    }
}
